name: Build Windows Executable
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow pyusb libusb customtkinter darkdetect
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconsole --onefile --add-data "resources;resources" --add-data "lang;lang" --add-data "devices;devices" gui.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaseCamp-Windows-Exe
          path: dist/*.exe
