name: Build Windows Executable
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow pyusb libusb customtkinter darkdetect psutil requests packaging
          
          # Create fake Linux modules to satisfy Windows imports
          echo "def getpwuid(n): return None" > pwd.py
          echo "def getpwnam(n): return None" > pwd.py
          
          # Fake 'resource' module with empty constants the app might look for
          echo "RLIMIT_AS = 0" > resource.py
          echo "def getrusage(n): return None" >> resource.py
          echo "def setrlimit(a, b): pass" >> resource.py

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconsole --onefile `
            --hidden-import=pwd `
            --hidden-import=resource `
            --add-data "resources;resources" `
            --add-data "lang;lang" `
            --add-data "devices;devices" `
            gui.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaseCamp-Windows-Exe
          path: dist/*.exe
