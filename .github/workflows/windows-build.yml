name: Build Windows Executable
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow pyusb libusb customtkinter darkdetect psutil requests packaging
          # Create a fake pwd module so the code doesn't crash on Windows
          echo "def getpwuid(n): return None" > pwd.py
          echo "def getpwnam(n): return None" > pwd.py

      - name: Build with PyInstaller
        run: |
          # We tell PyInstaller to include our fake pwd.py
          pyinstaller --noconsole --onefile `
            --hidden-import=pwd `
            --add-data "resources;resources" `
            --add-data "lang;lang" `
            --add-data "devices;devices" `
            gui.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaseCamp-Windows-Exe
          path: dist/*.exe
